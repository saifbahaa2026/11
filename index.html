<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Saif Portfolio">
  <title>Saif Portfolio</title>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body style="background-color: #1a0505; margin: 0; padding: 0; overflow-x: hidden;">

  <script>
    window.addEventListener('load', function() {
      var checkExist = setInterval(function() {
         if (document.querySelector('body')) {
            clearInterval(checkExist);
            var img = document.createElement('img');
            img.src = 'my_photo.jpg'; // اسم صورتك الحالي بالضبط
            img.style.position = 'absolute';
            img.style.top = '143px'; 
            img.style.left = '50%';
            img.style.transform = 'translateX(-50%)';
            img.style.width = '174px';
            img.style.height = '174px';
            img.style.borderRadius = '50%';
            img.style.zIndex = '9999';
            img.style.pointerEvents = 'none';
            img.style.border = '3px solid #FF3333';
            img.style.boxShadow = '0 0 25px rgba(255,51,51,0.5)';
            document.body.appendChild(img);
         }
      }, 200);
    });
  </script>

  <script src="flutter.js" defer></script>
  <script src="main.dart.js" defer></script>
</body>
</html>
